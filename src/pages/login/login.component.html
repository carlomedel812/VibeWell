<ion-content class="login-content">
  <div class="login-wrapper">

    <!-- Logo / Brand -->
    <div class="login-brand">
      <div class="brand-icon">
        <ion-icon name="lock-closed-outline"></ion-icon>
      </div>
      <h1 class="brand-name">VibeWell</h1>
      <p class="brand-tagline">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="login-card">

      <!-- Error message -->
      @if (errorMessage) {
        <div class="error-banner">
          {{ errorMessage }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

        <!-- Email -->
        <div class="field-group">
          <label class="field-label" for="email">Email</label>
          <div class="field-input-wrap">
            <ion-icon name="mail-outline" class="field-icon"></ion-icon>
            <input
              id="email"
              type="email"
              class="field-input"
              placeholder="you@example.com"
              [(ngModel)]="email"
              name="email"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="field-input-wrap">
            <ion-icon name="lock-closed-outline" class="field-icon"></ion-icon>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              class="field-input"
              placeholder="••••••••"
              [(ngModel)]="password"
              name="password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" (click)="togglePassword()">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </button>
          </div>
        </div>

        <!-- Forgot password -->
        <div class="forgot-row">
          <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="login-btn" [disabled]="isLoading">
          @if (isLoading) {
            <ion-spinner name="crescent" class="btn-spinner"></ion-spinner>
          } @else {
            Sign In
          }
        </button>

      </form>
    </div>

    <!-- Sign up link -->
    <p class="signup-prompt">
      Don't have an account?
      <a routerLink="/register" class="signup-link">Create one</a>
    </p>

  </div>
</ion-content>
