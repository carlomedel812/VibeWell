<ion-content class="forgot-password-content">
  <div class="forgot-password-wrapper">
    <a class="forgot-password-back" routerLink="/login">
      <ion-icon name="arrow-back-outline"></ion-icon>
      Back to sign in
    </a>

    <div class="forgot-password-brand">
      <div class="brand-icon">
        <ion-icon name="mail-outline"></ion-icon>
      </div>
      <h1 class="brand-name">Reset Password</h1>
      <p class="brand-tagline">Enter your email and we’ll send reset instructions.</p>
    </div>

    <div class="forgot-password-card">
      @if (errorMessage) {
        <div class="error-banner">
          {{ errorMessage }}
        </div>
      }

      @if (successMessage) {
        <div class="success-banner">
          {{ successMessage }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" #forgotPasswordForm="ngForm">
        <div class="field-group">
          <label class="field-label" for="email">Email</label>
          <div class="field-input-wrap">
            <ion-icon name="mail-outline" class="field-icon"></ion-icon>
            <input
              id="email"
              type="email"
              class="field-input"
              placeholder="you@example.com"
              [(ngModel)]="email"
              name="email"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <button type="submit" class="forgot-password-btn" [disabled]="isLoading">
          @if (isLoading) {
            <ion-spinner name="crescent" class="btn-spinner"></ion-spinner>
          } @else {
            Send Reset Link
          }
        </button>
      </form>
    </div>
  </div>
</ion-content>
